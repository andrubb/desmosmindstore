<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Desmos Mind — Gothic 3D Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050505;
  --bg2:#0a0a0a;
  --red:#DC1111;
  --red-bright:#ff2222;
  --red-dim:#a50d0d;
  --red-glow:rgba(220,17,17,0.45);
  --white:#f0ece4;
  --text:#d4d0c8;
  --muted:#6a6a62;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Inter',sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{height:100%;}
body{
  background:
    radial-gradient(ellipse 80% 60% at 50% 40%, rgba(220,17,17,0.08), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  perspective:1600px;
  overflow:hidden;
  position:relative;
}

/* Noise overlay */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:9999;
  mix-blend-mode:overlay;
}

/* Vignette */
body::after{
  content:'';
  position:fixed;inset:0;
  background:radial-gradient(ellipse 110% 100% at 50% 50%, transparent 45%, rgba(0,0,0,0.5) 82%, rgba(0,0,0,0.85) 100%);
  pointer-events:none;
  z-index:9998;
  mix-blend-mode:multiply;
}

/* ── STAGE ────────────────────────────── */
.stage{
  position:relative;
  width:340px;
  height:480px;
  transform-style:preserve-3d;
}

/* Ambient red ground glow under the card */
.stage::after{
  content:'';
  position:absolute;
  bottom:-40px;left:50%;
  transform:translateX(-50%);
  width:80%;height:80px;
  background:radial-gradient(ellipse 80% 100% at 50% 100%, rgba(220,17,17,0.4), transparent 70%);
  filter:blur(20px);
  z-index:-1;
  opacity:0.6;
  transition:opacity .5s ease, width .5s ease;
}
.stage.hover::after{opacity:1;width:95%;}

/* ── CARD ─────────────────────────────── */
.card{
  position:relative;
  width:100%;height:100%;
  background:linear-gradient(150deg, #0c0c0c 0%, #060606 100%);
  border:1px solid rgba(220,17,17,0.15);
  cursor:pointer;
  transform-style:preserve-3d;
  transition:transform .25s cubic-bezier(.16,1,.3,1), border-color .35s ease, box-shadow .35s ease;
  box-shadow:
    0 30px 60px rgba(0,0,0,0.7),
    0 0 0 1px rgba(255,255,255,0.02) inset,
    0 1px 0 rgba(255,255,255,0.04) inset;
  clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  overflow:hidden;
  user-select:none;
}
.card.hover{
  border-color:rgba(220,17,17,0.45);
  box-shadow:
    0 40px 80px rgba(0,0,0,0.85),
    0 0 60px rgba(220,17,17,0.18),
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 1px 0 rgba(255,255,255,0.06) inset,
    inset 0 -1px 0 rgba(220,17,17,0.5);
}

/* Cursor-following spotlight (radial gradient driven by mouse vars) */
.card::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(circle 260px at var(--mx,50%) var(--my,50%), rgba(220,17,17,0.18), transparent 60%);
  opacity:0;
  transition:opacity .35s ease;
  pointer-events:none;
  z-index:5;
  mix-blend-mode:screen;
}
.card.hover::before{opacity:1;}

/* Scanline overlay */
.card::after{
  content:'';
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(220,17,17,0.025) 2px, rgba(220,17,17,0.025) 3px);
  opacity:.5;
  pointer-events:none;
  z-index:4;
  mix-blend-mode:overlay;
}

/* ── CORNER BRACKETS ─────────────────── */
.corner{
  position:absolute;
  width:22px;height:22px;
  z-index:6;
  pointer-events:none;
}
.corner::before,.corner::after{
  content:'';
  position:absolute;
  background:var(--red);
  box-shadow:0 0 10px var(--red-glow);
}
.corner::before{width:1px;height:100%;}
.corner::after{width:100%;height:1px;}
.corner.tl{top:10px;left:10px;}
.corner.tr{top:10px;right:10px;transform:scaleX(-1);}
.corner.bl{bottom:10px;left:10px;transform:scaleY(-1);}
.corner.br{bottom:10px;right:10px;transform:scale(-1);}

/* ── TOP STITCH ────────────────────────── */
.top-stitch{
  position:absolute;top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--red), var(--red-bright), var(--red), transparent);
  box-shadow:0 0 12px var(--red);
  z-index:7;
  opacity:.8;
  animation:stitchPulse 3s ease-in-out infinite;
}
@keyframes stitchPulse{
  0%,100%{opacity:.55;}
  50%{opacity:1;}
}

/* ── IMAGE WRAP (Layer 1, z = 0) ──────── */
.img-wrap{
  position:absolute;
  top:14px;left:14px;right:14px;
  height:55%;
  overflow:hidden;
  background:#080808;
  transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.16,1,.3,1);
  z-index:2;
}

/* SVG bat illustration (placeholder for product image) */
.bat-bg{
  position:absolute;
  inset:0;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse 60% 50% at 50% 60%, rgba(220,17,17,0.22), transparent 70%),
    linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
}
.bat-svg{
  width:75%;
  height:auto;
  filter:
    drop-shadow(0 0 6px rgba(255,30,30,0.9))
    drop-shadow(0 0 18px rgba(220,17,17,0.6))
    drop-shadow(0 0 40px rgba(220,17,17,0.3));
  transition:transform .8s cubic-bezier(.16,1,.3,1), filter .6s ease;
  transform:translateZ(40px);
}
.card.hover .bat-svg{
  transform:translateZ(80px) scale(1.05);
  filter:
    drop-shadow(0 0 10px rgba(255,40,40,1))
    drop-shadow(0 0 30px rgba(220,17,17,0.85))
    drop-shadow(0 0 70px rgba(220,17,17,0.5));
}

/* Image edge fade */
.img-wrap::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, transparent 70%, rgba(5,5,5,0.95) 100%);
  pointer-events:none;
}

/* ── HOLOGRAPHIC SWEEP ────────────────── */
.holo{
  position:absolute;
  top:-20%;left:-60%;
  width:60%;height:140%;
  background:linear-gradient(115deg,
    transparent 30%,
    rgba(255,255,255,0.06) 45%,
    rgba(220,17,17,0.18) 50%,
    rgba(255,255,255,0.06) 55%,
    transparent 70%);
  transform:rotate(0deg);
  z-index:3;
  pointer-events:none;
  transition:left 0.9s cubic-bezier(.4,0,.2,1);
}
.card.hover .holo{left:140%;}

/* ── BADGES ──────────────────────────── */
.badge{
  position:absolute;
  z-index:8;
  font-family:var(--font-body);
  font-size:.55rem;
  font-weight:700;
  letter-spacing:.2em;
  text-transform:uppercase;
  padding:.32rem .8rem;
  transition:transform .4s cubic-bezier(.16,1,.3,1), box-shadow .4s ease;
}
.badge-new{
  top:22px;left:22px;
  background:rgba(220,17,17,0.12);
  color:var(--red-bright);
  border:1px solid rgba(220,17,17,0.4);
  backdrop-filter:blur(6px);
  transform:translateZ(30px);
}
.badge-sale{
  top:22px;right:22px;
  background:var(--red);
  color:var(--white);
  box-shadow:0 4px 14px rgba(220,17,17,0.45);
  transform:translateZ(30px);
}
.card.hover .badge-new{transform:translateZ(70px);}
.card.hover .badge-sale{transform:translateZ(70px);box-shadow:0 8px 26px rgba(220,17,17,0.7);}

/* ── INFO BLOCK (lifts in 3D) ────────── */
.info{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:1.2rem 1.5rem 1.4rem;
  z-index:6;
  transform-style:preserve-3d;
  background:linear-gradient(180deg, transparent 0%, rgba(5,5,5,0.85) 30%, var(--bg) 100%);
}

/* Brand hairline */
.info::before{
  content:'';
  position:absolute;
  top:0;left:1.5rem;right:1.5rem;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(220,17,17,0.45), transparent);
  opacity:0;
  transition:opacity .4s ease;
}
.card.hover .info::before{opacity:1;}

.brand{
  font-family:var(--font-body);
  font-size:.58rem;
  font-weight:700;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:var(--red);
  margin-bottom:.5rem;
  transition:transform .5s cubic-bezier(.16,1,.3,1), text-shadow .4s ease;
  transform:translateZ(20px);
}
.card.hover .brand{
  transform:translateZ(50px);
  text-shadow:0 0 14px rgba(220,17,17,0.6);
}

.name{
  font-family:var(--font-display);
  font-size:1.55rem;
  letter-spacing:.06em;
  color:var(--white);
  line-height:1.05;
  margin-bottom:.85rem;
  transition:transform .5s cubic-bezier(.16,1,.3,1), color .3s ease;
  transform:translateZ(30px);
}
.card.hover .name{transform:translateZ(60px);}

.price-row{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:.5rem;
  transform:translateZ(25px);
  transition:transform .5s cubic-bezier(.16,1,.3,1);
}
.card.hover .price-row{transform:translateZ(55px);}

.price{
  font-family:var(--font-display);
  font-size:1.45rem;
  letter-spacing:.04em;
  color:var(--white);
  transition:text-shadow .4s ease;
}
.card.hover .price{
  text-shadow:0 0 22px rgba(220,17,17,0.55), 0 0 6px rgba(255,40,40,0.4);
}
.price-old{
  font-family:var(--font-body);
  font-size:.78rem;
  color:var(--muted);
  text-decoration:line-through;
  margin-left:.35rem;
}

.size-pills{
  display:flex;
  gap:.35rem;
}
.size-pill{
  font-family:var(--font-body);
  font-size:.55rem;
  font-weight:700;
  letter-spacing:.1em;
  color:var(--text);
  padding:.22rem .45rem;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(0,0,0,0.5);
  transition:border-color .3s ease, color .3s ease;
}
.card.hover .size-pill{
  border-color:rgba(220,17,17,0.4);
}

/* ── QUICK ADD BUTTON (slides from below) ── */
.quick-add{
  position:absolute;
  bottom:0;left:0;right:0;
  height:54px;
  background:linear-gradient(135deg, var(--red) 0%, var(--red-dim) 60%, var(--red-bright) 100%);
  background-size:200% 100%;
  background-position:0% 0%;
  color:var(--white);
  font-family:var(--font-body);
  font-size:.62rem;
  font-weight:700;
  letter-spacing:.28em;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:.55rem;
  cursor:pointer;
  border:none;
  transform:translateY(100%);
  transition:transform .45s cubic-bezier(.16,1,.3,1), background-position .6s ease;
  z-index:9;
}
.card.hover .quick-add{transform:translateY(0);}
.quick-add:hover{background-position:100% 0%;}
.quick-add:active{transform:translateY(0) scale(0.985);}
.quick-add svg{width:14px;height:14px;}

/* ── 3D LABEL TAG (floating) ─────────── */
.float-tag{
  position:absolute;
  top:36%;right:-30px;
  background:linear-gradient(135deg, #1a0606, #050505);
  border:1px solid rgba(220,17,17,0.5);
  padding:.4rem .7rem;
  font-family:var(--font-display);
  font-size:.85rem;
  letter-spacing:.08em;
  color:var(--red-bright);
  transform:translateZ(60px) rotate(-2deg);
  box-shadow:0 8px 24px rgba(0,0,0,0.6), 0 0 16px rgba(220,17,17,0.2);
  opacity:0;
  transition:opacity .5s ease, transform .6s cubic-bezier(.16,1,.3,1);
  z-index:10;
  pointer-events:none;
}
.float-tag::before{
  content:'';
  position:absolute;
  top:50%;left:-6px;
  width:6px;height:6px;
  background:var(--red);
  border-radius:50%;
  transform:translateY(-50%);
  box-shadow:0 0 8px var(--red);
}
.card.hover .float-tag{
  opacity:1;
  transform:translateZ(100px) rotate(2deg);
}

/* ── REFLECTION (subtle floor) ───────── */
.reflection{
  position:absolute;
  bottom:-100%;left:0;right:0;
  height:100%;
  background:inherit;
  transform:rotateX(180deg);
  opacity:.06;
  mask-image:linear-gradient(to bottom, black, transparent 50%);
  -webkit-mask-image:linear-gradient(to bottom, black, transparent 50%);
  pointer-events:none;
  z-index:-2;
}

/* ── TAGLINE BELOW STAGE ─────────────── */
.label-strip{
  position:absolute;
  top:calc(50% + 280px);
  left:50%;
  transform:translateX(-50%);
  font-family:var(--font-body);
  font-size:.62rem;
  letter-spacing:.45em;
  text-transform:uppercase;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:1rem;
}
.label-strip::before,.label-strip::after{
  content:'';
  width:36px;height:1px;
  background:rgba(220,17,17,0.35);
}

/* ── RESPONSIVE ──────────────────────── */
@media(max-width:480px){
  .stage{width:300px;height:430px;}
  .name{font-size:1.35rem;}
  .label-strip{display:none;}
}

/* ── REDUCED MOTION ──────────────────── */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:.01ms !important;
    transition-duration:.15s !important;
  }
}
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="card" id="card">
    <span class="top-stitch"></span>
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <span class="badge badge-new">New Drop</span>
    <span class="badge badge-sale">-25%</span>

    <div class="img-wrap">
      <div class="bat-bg">
        <!-- Stylized bat/wings SVG -->
        <svg class="bat-svg" viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="batGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#ff2222"/>
              <stop offset="100%" stop-color="#a50d0d"/>
            </linearGradient>
          </defs>
          <path fill="url(#batGrad)" d="M120 84
            C112 88 104 80 96 78
            L86 88 L74 70 L60 80 L52 56
            L42 60 L36 44 L24 54 L16 36 L4 42 L8 22 L26 30 L40 18
            L52 30 L64 16 L78 28 L94 14 L108 28
            C112 12 116 4 120 4
            C124 4 128 12 132 28
            L146 14 L162 28 L176 16 L188 30 L200 18 L214 30 L232 22 L236 42 L224 36 L216 54 L204 44 L198 60 L188 56 L180 80 L166 70 L154 88 L144 78
            C136 80 128 88 120 84 Z"/>
          <circle cx="116" cy="38" r="2.5" fill="#fff"/>
          <circle cx="124" cy="38" r="2.5" fill="#fff"/>
        </svg>
      </div>
    </div>

    <span class="holo"></span>

    <span class="float-tag">CR · 24K</span>

    <div class="info">
      <p class="brand">Desmos · Mind</p>
      <h3 class="name">RAVEN HOODIE — OBSIDIAN</h3>
      <div class="price-row">
        <div>
          <span class="price">₡18.900</span>
          <span class="price-old">₡25.200</span>
        </div>
        <div class="size-pills">
          <span class="size-pill">S</span>
          <span class="size-pill">M</span>
          <span class="size-pill">L</span>
        </div>
      </div>
    </div>

    <button class="quick-add" type="button" id="quickAdd">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
      </svg>
      Add to Drop
    </button>
  </div>
</div>

<div class="label-strip">Wear Your Identity</div>

<script>
(function(){
  const stage = document.getElementById('stage');
  const card  = document.getElementById('card');
  const quickAdd = document.getElementById('quickAdd');

  // Skip 3D tilt on touch devices / reduced motion
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const isTouch = matchMedia('(hover: none)').matches;
  if (reduceMotion || isTouch) {
    // Keep hover state on tap for touch
    if (isTouch) {
      card.addEventListener('touchstart', () => card.classList.add('hover'), {passive:true});
    }
    return setupQuickAdd();
  }

  // Mouse-driven 3D tilt
  let rafId = null;
  const damp = 0.12;
  let tx = 0, ty = 0, cx = 0, cy = 0;

  function onMove(e){
    const rect = stage.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width;
    const py = (e.clientY - rect.top)  / rect.height;

    // Target rotations (degrees) — invert Y so tilt feels natural
    tx = (py - 0.5) * -14;   // rotateX
    ty = (px - 0.5) *  14;   // rotateY

    // Cursor spotlight position (CSS vars)
    card.style.setProperty('--mx', (px * 100) + '%');
    card.style.setProperty('--my', (py * 100) + '%');

    if (!rafId) loop();
  }

  function loop(){
    cx += (tx - cx) * damp;
    cy += (ty - cy) * damp;
    card.style.transform = `rotateX(${cx.toFixed(2)}deg) rotateY(${cy.toFixed(2)}deg)`;

    if (Math.abs(tx - cx) > 0.05 || Math.abs(ty - cy) > 0.05){
      rafId = requestAnimationFrame(loop);
    } else {
      rafId = null;
    }
  }

  stage.addEventListener('mouseenter', () => {
    card.classList.add('hover');
    stage.classList.add('hover');
  });
  stage.addEventListener('mouseleave', () => {
    card.classList.remove('hover');
    stage.classList.remove('hover');
    tx = 0; ty = 0;
    if (!rafId) loop();
  });
  stage.addEventListener('mousemove', onMove);

  setupQuickAdd();

  function setupQuickAdd(){
    quickAdd.addEventListener('click', (e) => {
      e.stopPropagation();
      // Tiny micro-feedback
      quickAdd.animate(
        [{transform:'translateY(0) scale(1)'},{transform:'translateY(0) scale(0.96)'},{transform:'translateY(0) scale(1)'}],
        {duration:260, easing:'cubic-bezier(.16,1,.3,1)'}
      );
      // Brief flash on the card
      card.animate(
        [{filter:'brightness(1)'},{filter:'brightness(1.25)'},{filter:'brightness(1)'}],
        {duration:380, easing:'ease-out'}
      );
    });
  }
})();
</script>

</body>
</html>
